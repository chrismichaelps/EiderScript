name: AuthForm
global: {}
router:
  routes:
    - path: /login
      component: LoginForm
    - path: /register
      component: RegisterForm

components:
  - name: LoginForm
    signals:
      email: null
      password: null
      showPassword: false
      authenticated: false

    methods:
      signOut: |
        authenticated = false;
        email = null
        password = null

    template:
      div .flex .min-h-screen .items-center .justify-center .px-4 .py-12 .bg-slate-50 .dark:bg-slate-950 .antialiased:
        children:
          - div .fixed .inset-0 .-z-10 .overflow-hidden .pointer-events-none:
              children:
                - div .absolute .-top-[10%] .-left-[10%] .h-[40%] .w-[40%] .rounded-full .bg-slate-200/40 .blur-[120px] .dark:bg-slate-800/20: ""
                - div .absolute .-bottom-[10%] .-right-[10%] .h-[40%] .w-[40%] .rounded-full .bg-slate-200/40 .blur-[120px] .dark:bg-slate-800/20: ""

          - div .w-full .max-w-[448px] .rounded-xl .border .border-slate-200 .bg-white .p-8 .shadow-sm .dark:border-slate-800 .dark:bg-slate-900:
              children:
                # ── Success ──
                - div .w-full .flex .flex-col .items-center .py-8:
                    v-if: authenticated
                    children:
                      - div .w-20 .h-20 .bg-emerald-100 .dark:bg-emerald-900/30 .rounded-full .flex .items-center .justify-center .mb-6 .animate-bounce:
                          span .text-3xl: "🎉"
                      - h1 .text-3xl .font-bold .text-slate-900 .dark:text-slate-100 .mb-2: "Welcome back!"
                      - p .text-slate-500 .dark:text-slate-400 .text-center .mb-8: "You are now signed in."
                      - button .w-full .rounded-lg .bg-slate-900 .px-4 .py-3 .text-sm .font-semibold .text-white .hover:bg-slate-800 .dark:bg-slate-100 .dark:text-slate-900 .cursor-pointer:
                          "@click": signOut
                          children:
                            - span: "Sign out"

                # ── Form ──
                - div:
                    v-else: true
                    children:
                      - div .mb-8 .flex .flex-col .items-center .text-center:
                          children:
                            - div .mb-6 .flex .h-12 .w-12 .items-center .justify-center .rounded-lg .bg-slate-900 .dark:bg-white .text-white .dark:text-slate-900:
                                img .w-6 .h-6 .dark:invert:
                                  attrs:
                                    src: "https://api.iconify.design/lucide:user.svg"
                                    alt: "User"
                            - h1 .text-2xl .font-semibold .tracking-tight .text-slate-900 .dark:text-slate-100: "Sign in"
                            - p .mt-2 .text-sm .text-slate-600 .dark:text-slate-400: "Use your Workspace account to continue"

                      - form .space-y-6:
                          "@submit.prevent": "authenticated = true"
                          children:
                            # ── Email ──
                            - div .space-y-2:
                                children:
                                  - label .block .text-sm .font-medium .text-slate-700 .dark:text-slate-300:
                                      attrs:
                                        for: "email"
                                      text: "Email"
                                  - input .block .w-full .appearance-none .rounded-lg .border .border-slate-300 .bg-white .px-4 .py-3 .text-sm .text-slate-900 .placeholder-slate-400 .outline-none .focus:border-slate-900 .focus:ring-2 .focus:ring-slate-900/10 .dark:border-slate-700 .dark:bg-slate-800 .dark:text-slate-100:
                                      v-model: email
                                      attrs:
                                        id: "email"
                                        type: "email"
                                        required: true
                                        placeholder: "Enter your email"
                                        autocomplete: "email"

                            # ── Password ──
                            - div .space-y-2:
                                children:
                                  - div .flex .items-center .justify-between:
                                      children:
                                        - label .block .text-sm .font-medium .text-slate-700 .dark:text-slate-300:
                                            attrs:
                                              for: "password"
                                            text: "Password"
                                        - a .text-xs .font-semibold .text-slate-900 .hover:underline .dark:text-slate-300:
                                            attrs:
                                              href: "#"
                                            text: "Forgot password?"
                                  - div .relative:
                                      children:
                                        - input .block .w-full .appearance-none .rounded-lg .border .border-slate-300 .bg-white .px-4 .py-3 .pr-12 .text-sm .text-slate-900 .placeholder-slate-400 .outline-none .focus:border-slate-900 .focus:ring-2 .focus:ring-slate-900/10 .dark:border-slate-700 .dark:bg-slate-800 .dark:text-slate-100:
                                            v-model: password
                                            attrs:
                                              id: "password"
                                              required: true
                                              minlength: "8"
                                              placeholder: "Enter your password"
                                              autocomplete: "current-password"
                                              :type: "showPassword ? 'text' : 'password'"
                                        - button .absolute .right-3 .top-1/2 .-translate-y-1/2 .p-1 .text-slate-400 .hover:text-slate-900 .dark:hover:text-white .cursor-pointer .transition-colors:
                                            "@click": "showPassword = !showPassword"
                                            attrs:
                                              type: "button"
                                            children:
                                              - img .w-5 .h-5 .opacity-60 .dark:invert:
                                                  attrs:
                                                    ":src": "showPassword ? 'https://api.iconify.design/lucide:eye-off.svg' : 'https://api.iconify.design/lucide:eye.svg'"

                            # ── Stay signed in ──
                            - div .flex .items-center:
                                children:
                                  - input .h-4 .w-4 .rounded .border-slate-300 .cursor-pointer:
                                      attrs:
                                        type: "checkbox"
                                        id: "stay-signed"
                                  - label .ml-2 .text-sm .text-slate-600 .dark:text-slate-400 .cursor-pointer:
                                      attrs:
                                        for: "stay-signed"
                                      text: "Stay signed in"

                            - button .w-full .rounded-lg .bg-slate-900 .px-4 .py-3 .text-sm .font-semibold .text-white .transition-all .hover:bg-slate-800 .active:scale-[0.98] .focus:outline-none .focus:ring-2 .focus:ring-slate-400 .focus:ring-offset-2 .dark:bg-slate-100 .dark:text-slate-900 .dark:hover:bg-white .cursor-pointer:
                                attrs:
                                  type: "submit"
                                children:
                                  - span: "Next"

                      # Divider
                      - div .my-8 .flex .items-center:
                          children:
                            - div .flex-grow .border-t .border-slate-200 .dark:border-slate-800: ""
                            - span .mx-4 .text-xs .font-medium .uppercase .tracking-wider .text-slate-400: "or"
                            - div .flex-grow .border-t .border-slate-200 .dark:border-slate-800: ""

                      # Google
                      - button .flex .w-full .items-center .justify-center .gap-3 .rounded-lg .border .border-slate-300 .bg-white .px-4 .py-3 .text-sm .font-medium .text-slate-700 .transition-all .hover:bg-slate-50 .active:scale-[0.98] .dark:border-slate-700 .dark:bg-slate-800 .dark:text-slate-100 .dark:hover:bg-slate-700 .cursor-pointer:
                          "@click": "authenticated = true"
                          children:
                            - img .h-5 .w-5:
                                attrs:
                                  src: "https://api.iconify.design/logos:google-icon.svg"
                                  alt: "Google"
                            - span: "Continue with Google"

                      - div .mt-8 .text-center .text-sm .text-slate-600 .dark:text-slate-400:
                          children:
                            - p: "Not your computer? Use Guest mode to sign in privately."
                            - div .mt-4 .flex .justify-center .gap-4:
                                children:
                                  - a .font-medium .text-slate-900 .hover:underline .dark:text-slate-300:
                                      attrs:
                                        href: "#"
                                      text: "Create account"
                                  - a .font-medium .text-slate-900 .hover:underline .dark:text-slate-300:
                                      attrs:
                                        href: "#"
                                      text: "Help"

  - name: RegisterForm
    signals:
      email: ""
    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .flex .items-center .justify-center:
        div .w-full .max-w-[448px] .bg-white .dark:bg-slate-900 .rounded-xl .border .border-slate-200 .dark:border-slate-800 .p-10:
          children:
            - h1 .text-2xl .font-semibold .mb-6: "Create account"
            - a .text-indigo-600 .hover:underline:
                attrs:
                  href: "/login"
                text: "Back to login"