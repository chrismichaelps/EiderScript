name: ProductCard
global: {}
router:
  routes:
    - path: /
      component: ProductGrid

components:
  - name: ProductCard
    signals:
      liked: false
      quantity: 1
      selectedSize: "M"
    computeds:
      totalPrice: "price * quantity"

    methods:
      toggleLike: "liked = !liked"
      increment: "if (quantity < stock) quantity = quantity + 1"
      decrement: "if (quantity > 1) quantity = quantity - 1"
      selectSize: "selectedSize = size"
      addToCart: "cartCount = cartCount + quantity"

    template:
      article .group .bg-white .dark:bg-gray-900 .rounded-2xl .overflow-hidden
        .border .border-gray-200 .dark:border-gray-800 .shadow-sm
        .hover:shadow-xl .hover:border-gray-300 .dark:hover:border-gray-700
        .transition-all .duration-300:

        # Product image
        div .relative .overflow-hidden .bg-gray-100 .dark:bg-gray-800 .aspect-square:
          img .w-full .h-full .object-cover .transition-transform .duration-500
            .group-hover:scale-105:
            attrs:
              src: "{{ imageUrl }}"
              alt: "{{ name }}"

          # Badge: new / sale / out of stock
          div .absolute .top-3 .left-3 .flex .gap-2:
            span .px-2 .py-1 .rounded-full .text-xs .font-semibold
              .bg-indigo-500 .text-white:
              v-if: isNew
              text: "New"
            span .px-2 .py-1 .rounded-full .text-xs .font-semibold
              .bg-red-500 .text-white:
              v-if: onSale
              text: "-{{ discountPct }}%"

          # Wishlist button (group-hover reveal)
          button .absolute .top-3 .right-3 .w-9 .h-9 .rounded-full
            .bg-white/80 .dark:bg-gray-900/80 .backdrop-blur-sm
            .flex .items-center .justify-center
            .opacity-0 .group-hover:opacity-100
            .transition-all .duration-200
            .hover:bg-white .dark:hover:bg-gray-900
            .shadow-sm:
            "@click": toggleLike
            span .text-lg: "{{ liked ? '❤️' : '🤍' }}"

        # Card body
        div .p-4 .space-y-3:
          # Name + price row
          div .flex .items-start .justify-between .gap-2:
            div:
              p .text-xs .font-medium .text-indigo-600 .dark:text-indigo-400
                .uppercase .tracking-wider .mb-0.5: "{{ brand }}"
              h3 .font-semibold .text-gray-900 .dark:text-white .leading-snug:
                "{{ name }}"
            div .text-right .flex-shrink-0:
              p .text-lg .font-bold .text-gray-900 .dark:text-white:
                "${{ price }}"
              p .text-xs .text-gray-400 .line-through:
                v-if: onSale
                text: "${{ originalPrice }}"

          # Rating
          div .flex .items-center .gap-1.5:
            div .flex .gap-0.5:
              span .text-amber-400 .text-sm: "★★★★★"
            p .text-xs .text-gray-500: "({{ reviewCount }})"

          # Sizes
          div:
            p .text-xs .font-medium .text-gray-500 .dark:text-gray-400 .mb-1.5:
              "Size: {{ selectedSize }}"
            div .flex .gap-1.5:
              button .w-9 .h-9 .rounded-lg .text-sm .font-medium .border .transition-all:
                v-for: "size in ['XS','S','M','L','XL']"
                "@click": "selectSize(size)"
                text: "{{ size }}"

          # Quantity + Add to cart
          div .flex .items-center .gap-3 .pt-1:
            div .flex .items-center .gap-2 .bg-gray-100 .dark:bg-gray-800 .rounded-lg .p-1:
              button .w-7 .h-7 .rounded-md .flex .items-center .justify-center
                .text-gray-700 .dark:text-gray-200 .hover:bg-white .dark:hover:bg-gray-700
                .transition-colors .disabled:opacity-40 .text-sm .font-bold:
                "@click": decrement
                text: "−"
              span .w-6 .text-center .text-sm .font-semibold .text-gray-900 .dark:text-white:
                "{{ quantity }}"
              button .w-7 .h-7 .rounded-md .flex .items-center .justify-center
                .text-gray-700 .dark:text-gray-200 .hover:bg-white .dark:hover:bg-gray-700
                .transition-colors .disabled:opacity-40 .text-sm .font-bold:
                "@click": increment
                text: "+"
            button .flex-1 .bg-indigo-600 .hover:bg-indigo-700 .active:scale-95
              .text-white .text-sm .font-semibold .py-2 .rounded-xl
              .transition-all .duration-150 .shadow-sm .shadow-indigo-500/30:
              "@click": addToCart
              text: "Add to cart"

  - name: ProductGrid
    signals:
      cartCount: 0
      searchQuery: ""
      sortBy: "featured"

    computeds:
      sortedProducts: "products"

    methods:
      setSort: "sortBy = value"

    template:
      div .min-h-screen .bg-gray-50 .dark:bg-gray-950:

        # Header with cart
        header .sticky .top-0 .z-40 .bg-white/90 .dark:bg-gray-900/90 .backdrop-blur-md
          .border-b .border-gray-200 .dark:border-gray-800 .px-6 .py-4:
          div .max-w-7xl .mx-auto .flex .items-center .justify-between:
            h1 .text-xl .font-bold .text-gray-900 .dark:text-white: "Shop"
            div .flex .items-center .gap-4:
              div .relative:
                input .bg-gray-100 .dark:bg-gray-800 .border-none .rounded-lg
                  .px-4 .py-2 .pl-9 .text-sm .text-gray-900 .dark:text-white
                  .outline-none .focus:ring-2 .focus:ring-indigo-400 .w-64:
                  v-model: searchQuery
                  attrs:
                    type: search
                    placeholder: "Search products..."
              button .relative .p-2:
                span .absolute .-top-1 .-right-1 .w-5 .h-5 .rounded-full
                  .bg-red-500 .text-white .text-xs .font-bold .flex .items-center .justify-center:
                  v-if: cartCount > 0
                  text: "{{ cartCount }}"
                span .text-xl: "🛒"

        # Main
        main .max-w-7xl .mx-auto .px-6 .py-8:
          # Sort + filter bar
          div .flex .items-center .justify-between .mb-6:
            p .text-sm .text-gray-500: "{{ sortedProducts.length }} products"
            select .text-sm .bg-white .dark:bg-gray-800 .border .border-gray-200 .dark:border-gray-700
              .rounded-lg .px-3 .py-2 .outline-none .focus:ring-2 .focus:ring-indigo-400:
              text: "Sort by"

          # Grid
          div .grid .grid-cols-1 .sm:grid-cols-2 .lg:grid-cols-3 .xl:grid-cols-4 .gap-6:
            ProductCard:
              v-for: "product in sortedProducts"
              :key: product.id
