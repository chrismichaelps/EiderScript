# @EiderScript.Example.StaticContent
%YAML 1.2
---
name: StaticContentApp
router:
  routes:
    - path: /
      component: StaticDemo

components:
  - name: StaticDemo
    signals:
      count: 0
      show: true
      staticMsg: "This never changes"
    computeds:
      doubleCount: count * 2
    methods:
      increment: count = count + 1
      toggle: show = !show
    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .py-12 .px-4:
        div .max-w-2xl .mx-auto .bg-white .dark:bg-slate-900 .rounded-2xl .shadow-sm .border .border-slate-200 .dark:border-slate-800 .p-8 .space-y-8:
          - h1 .text-3xl .font-bold .text-slate-900 .dark:text-white .mb-2: "Static Content & Directives"
          - p .text-slate-500 .dark:text-slate-400 .mb-8: "Showcasing v-once, v-pre, v-memo, and other EiderScript directives."

          # Section 1: v-once
          - div:
              children:
                - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white .mb-3: "v-once (renders once)"
                - div .bg-slate-100 .dark:bg-slate-800/50 .border .border-slate-200 .dark:border-slate-700 .rounded-xl .p-4:
                    v-once: true
                    children:
                      - p .text-slate-700 .dark:text-slate-300: "Static Initial Count: {{ count }}"
                      - p .text-slate-700 .dark:text-slate-300: "Static Initial Double: {{ doubleCount }}"

          # Section 2: v-pre
          - div:
              children:
                - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white .mb-3: "v-pre (raw content)"
                - pre .bg-slate-900 .text-emerald-400 .p-4 .rounded-xl .text-sm:
                    v-pre: true
                    text: "{{ raw interpolation }} - ignored by compiler"

          # Section 3: v-memo
          - div:
              children:
                - div .flex .items-center .justify-between .mb-3:
                    children:
                      - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white: "v-memo (cached render)"
                      - button .bg-slate-900 .hover:bg-slate-800 .dark:bg-slate-100 .dark:text-slate-900 .dark:hover:bg-white .text-white .px-4 .py-1.5 .rounded-lg .text-sm .font-medium:
                          "@click": increment
                          text: "Increment"
                - div .bg-slate-50 .dark:bg-slate-800 .border .border-slate-200 .dark:border-slate-700 .rounded-xl .p-4:
                    v-memo: count
                    p .text-slate-700 .dark:text-slate-300: "Count (memoized): {{ count }}"

          # Section 4: v-show
          - div:
              children:
                - div .flex .items-center .justify-between .mb-3:
                    children:
                      - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white: "v-show (conditional visibility)"
                      - button .bg-slate-100 .dark:bg-slate-800 .text-slate-600 .dark:text-slate-300 .hover:bg-slate-200 .dark:hover:bg-slate-700 .px-4 .py-1.5 .rounded-lg .text-sm:
                          "@click": toggle
                          text: "Toggle"
                - div .bg-slate-50 .dark:bg-slate-800 .border .border-slate-200 .dark:border-slate-700 .rounded-xl .p-4:
                    children:
                      - p .text-emerald-600 .font-medium:
                          v-show: show
                          text: "✓ This content is conditionally visible"
                      - p .text-slate-400:
                          v-show: "!show"
                          text: "Content is hidden..."
