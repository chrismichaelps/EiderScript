name: CounterApp
global: {}
router:
  routes:
    - path: /
      component: Counter
components:
  - name: Counter
    signals:
      count: 0
    computeds:
      doubled: count * 2
    methods:
      increment: count = count + 1
      decrement: count = count - 1
    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .flex .items-center .justify-center .p-4 .sm:p-8:
        div .bg-white .dark:bg-slate-900 .p-12 .sm:p-20 .rounded-[3rem] .shadow-2xl .shadow-slate-900/5 .border .border-slate-200 .dark:border-slate-800 .text-center .w-full .max-w-md .sm:max-w-xl .transition-all:
          h1 .text-sm .font-bold .text-slate-500 .dark:text-slate-400 .uppercase .tracking-widest .mb-6: "Counter"
          p .text-7xl .font-black .text-slate-900 .dark:text-white .mb-2: "{{ count }}"
          p .text-xs .text-slate-400 .mb-8: "Doubled: {{ doubled }}"
          div .flex .gap-3:
            button .flex-1 .bg-slate-900 .dark:bg-slate-100 .hover:bg-slate-800 .dark:hover:bg-white .text-white .dark:text-slate-900 .font-bold .py-4 .rounded-2xl .shadow-lg .shadow-slate-900/10 .transition-all .active:scale-95:
              "@click": increment
              text: "+"
            button .flex-1 .bg-slate-100 .dark:bg-slate-800 .hover:bg-slate-200 .dark:hover:bg-slate-700 .text-slate-600 .dark:text-slate-300 .font-bold .py-4 .rounded-2xl .transition-all .active:scale-95:
              "@click": decrement
              text: "−"

