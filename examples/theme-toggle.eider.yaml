# @EiderScript.Example.ThemeToggle
%YAML 1.2
---
name: ThemeToggle
global: {}
router:
  routes:
    - path: /
      component: ThemeShowcase

components:
  - name: ThemeShowcase
    signals:
      dark: false

    template:
      # Use dynamic class to control the root theme state
      div:
        class: "min-h-screen flex items-center justify-center p-6 antialiased transition-colors duration-500"
        ":class": "dark ? 'dark bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'"
        children:
          # Central card with adaptive styling
          - div:
              class: "w-full max-w-md rounded-[3rem] p-16 shadow-2xl border transition-all duration-500 flex flex-col items-center text-center"
              ":class": "dark ? 'bg-slate-900 border-slate-800 shadow-slate-950/40' : 'bg-white border-slate-100 shadow-slate-200/50'"
              children:
                - h1 .text-4xl .font-black .tracking-tighter .mb-4: "Appearance"
                - p:
                    class: "text-sm font-medium mb-12 transition-colors"
                    ":class": "dark ? 'text-slate-400' : 'text-slate-500'"
                    text: "Toggle the switch to change the workspace theme"

                # Functional toggle component
                - div .relative .inline-block .w-11 .h-5:
                    children:
                      - input:
                          attrs:
                            id: theme-switch
                            type: checkbox
                            ":checked": dark
                          class: "peer appearance-none w-11 h-5 bg-slate-100 dark:bg-slate-800 rounded-full checked:bg-slate-800 dark:checked:bg-slate-100 cursor-pointer transition-colors duration-300"
                          "@change": "dark = $event.target.checked"
                      - label:
                          attrs:
                            for: theme-switch
                          class: "absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-slate-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-slate-800 cursor-pointer"

                # Text indicator
                - div:
                    class: "mt-12 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em] transition-all"
                    ":class": "dark ? 'bg-slate-800 text-slate-400' : 'bg-slate-100 text-slate-500'"
                    text: "{{ dark ? 'Dark Mode' : 'Light Mode' }}"
