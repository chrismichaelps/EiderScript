name: DirectivesDemoApp
global: {}
router:
  routes:
    - path: /
      component: DirectivesDemo

components:
  - name: DirectivesDemo
    signals:
      message: "Hello, EiderScript!"
      rawHtml: "<span class='text-slate-500 font-bold'>This is raw HTML</span>"
      clicks: 0
      user: 
        name: "Chris"
        role: "Admin"
    methods:
      increment: "clicks = clicks + 1"
      reset: "clicks = 0"

    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .py-12 .px-4:

        div .max-w-3xl .mx-auto .space-y-6:
          # Page title and summary
          - h1 .text-3xl .font-bold .text-slate-900 .dark:text-white .mb-2: "Directives Showcase"
          - p .text-slate-500 .dark:text-slate-400 .mb-8: "Deep dive into EiderScript's Vue-powered directive set."

          # Text content binding
          - div .bg-white .dark:bg-slate-900 .p-6 .border .border-slate-200 .dark:border-slate-800 .rounded-2xl .shadow-sm:
              children:
                - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white .mb-4: "v-text (explicit text bind)"
                - p .text-slate-600 .dark:text-slate-400 .mb-2 .text-sm: "Normal interpolation: {{ message }}"
                - div .text-slate-900 .dark:text-slate-100 .font-medium:
                    v-text: message

          # HTML content binding
          - div .bg-white .dark:bg-slate-900 .p-6 .border .border-slate-200 .dark:border-slate-800 .rounded-2xl .shadow-sm:
              children:
                - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white .mb-4: "v-html (trusted content)"
                - div .p-4 .bg-slate-50 .dark:bg-slate-800 .border .border-slate-100 .dark:border-slate-700 .rounded-xl:
                    v-html: rawHtml

          # Event listener handling
          - div .bg-white .dark:bg-slate-900 .p-6 .border .border-slate-200 .dark:border-slate-800 .rounded-2xl .shadow-sm:
              children:
                - h2 .text-lg .font-semibold .text-slate-900 .dark:text-white .mb-4: "v-on & Events"
                - div .flex .items-center .gap-3:
                    children:
                      - button .bg-slate-900 .dark:bg-slate-100 .hover:bg-slate-800 .dark:hover:bg-white .text-white .dark:text-slate-900 .px-4 .py-2 .rounded-xl .text-sm .font-semibold .shadow-sm .transition-all .active:scale-95:
                          "@click": increment
                          text: "Increment (+1)"
                      - button .bg-slate-100 .dark:bg-slate-800 .hover:bg-slate-200 .dark:hover:bg-slate-700 .text-slate-600 .dark:text-slate-300 .px-4 .py-2 .rounded-xl .text-sm:
                          "@click": reset
                          text: "Reset"
                - p .mt-4 .text-2xl .font-black .text-slate-900 .dark:text-white:
                    text: "{{ clicks }}"

  - name: Card
    template:
      div .bg-white .dark:bg-slate-900 .border .border-slate-200 .dark:border-slate-800 .rounded-2xl .shadow-sm .overflow-hidden:
        children:
          - div .bg-slate-50 .dark:bg-slate-800/50 .px-6 .py-3 .border-b .border-slate-100 .dark:border-slate-800:
              slot: header
          - div .px-6 .py-4:
              slot: default
              v-bind: "{ profile: parent.user }"
