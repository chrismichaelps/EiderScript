name: TodoApp
global: {}
router:
  routes:
    - path: /
      component: TodoApp

components:
  - name: TodoApp
    signals:
      todos:
        - id: 1
          text: "Buy groceries"
          done: false
        - id: 2
          text: "Walk the dog"
          done: true
        - id: 3
          text: "Read a book"
          done: false
      newTodo: ""
      filter: "all"

    computeds:
      totalCount: todos.length
      doneCount: todos.filter(t => t.done).length
      pendingCount: todos.filter(t => !t.done).length

    methods:
      addTodo: |
        if (newTodo.trim()) {
          todos.push({ id: Date.now(), text: newTodo.trim(), done: false });
          newTodo = "";
        }
      toggleTodo: "todos = todos.map(t => t.id === id ? {...t, done: !t.done} : t)"
      removeTodo: "todos = todos.filter(t => t.id !== id)"
      clearDone: "todos = todos.filter(t => !t.done)"
      setFilter: "filter = value"

    template:
      div .min-h-screen .bg-gradient-to-br .from-violet-50 .to-indigo-100 .dark:from-gray-900 .dark:to-gray-800 .py-12 .px-4:
        div .max-w-lg .mx-auto:

          # Header
          div .text-center .mb-10:
            h1 .text-4xl .font-extrabold .text-indigo-600 .dark:text-indigo-400 .mb-2: "Todos"
            p .text-gray-500 .dark:text-gray-400 .text-sm:
              "{{ doneCount }} of {{ totalCount }} completed"

          # Add todo input
          div .flex .gap-2 .mb-6:
            input .flex-1 .rounded-xl .border .border-gray-200 .dark:border-gray-700 .bg-white .dark:bg-gray-800 .text-gray-900 .dark:text-white .px-4 .py-3 .text-sm .outline-none .focus:ring-2 .focus:ring-indigo-400 .transition-all:
              v-model: newTodo
              attrs:
                placeholder: "What needs to be done?"
                type: text
            button .bg-indigo-500 .hover:bg-indigo-600 .active:scale-95 .text-white .font-semibold .px-6 .py-3 .rounded-xl .transition-all .duration-150 .shadow-sm:
              "@click": addTodo
              text: "Add"

          # Filter tabs
          div .flex .gap-1 .bg-white .dark:bg-gray-800 .p-1 .rounded-lg .mb-4 .shadow-sm:
            - button .flex-1 .py-2 .px-3 .text-sm .font-medium .rounded-md .transition-colors .text-gray-500 .hover:text-gray-700 .dark:text-gray-400:
                "@click": "setFilter('all')"
                text: "All ({{ totalCount }})"
            - button .flex-1 .py-2 .px-3 .text-sm .font-medium .rounded-md .transition-colors .text-gray-500 .hover:text-gray-700 .dark:text-gray-400:
                "@click": "setFilter('pending')"
                text: "Pending ({{ pendingCount }})"
            - button .flex-1 .py-2 .px-3 .text-sm .font-medium .rounded-md .transition-colors .text-gray-500 .hover:text-gray-700 .dark:text-gray-400:
                "@click": "setFilter('done')"
                text: "Done ({{ doneCount }})"

          # Todo list
          div .space-y-2:
            div .flex .items-center .gap-3 .bg-white .dark:bg-gray-800 .rounded-xl .px-4 .py-3 .shadow-sm .group .transition-all .hover:shadow-md:
              v-for: "todo in todos"
              :key: todo.id

              # Checkbox
              button .w-6 .h-6 .rounded-full .border-2 .border-gray-300 .dark:border-gray-600 .flex-shrink-0 .flex .items-center .justify-center .transition-all .hover:border-indigo-400:
                "@click": "toggleTodo(todo.id)"
              p .flex-1 .text-sm .text-gray-700 .dark:text-gray-200: "{{ todo.text }}"
              button .opacity-0 .group-hover:opacity-100 .text-red-400 .hover:text-red-600 .transition-all .text-xs .font-medium:
                "@click": "removeTodo(todo.id)"
                text: "Remove"

          # Footer
          div .flex .items-center .justify-between .mt-4 .px-1:
            p .text-xs .text-gray-400: "{{ pendingCount }} items left"
            button .text-xs .text-gray-400 .hover:text-red-500 .transition-colors:
              v-if: doneCount > 0
              "@click": clearDone
              text: "Clear completed"
