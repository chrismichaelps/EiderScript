# @EiderScript.Example.TodoApp
%YAML 1.2
---
name: TodoApp
global: {}
router:
  routes:
    - path: /
      component: TodoApp

components:
  - name: TodoApp
    signals:
      todos:
        - id: 1
          text: "Buy groceries"
          done: false
        - id: 2
          text: "Walk the dog"
          done: true
        - id: 3
          text: "Read a book"
          done: false
      newTodo: ""
      statusFilter: "all"

    computeds:
      totalCount: todos.length
      doneCount: todos.filter(t => t.done).length
      pendingCount: todos.filter(t => !t.done).length
      filteredTodos: |
        statusFilter === 'pending' ? todos.filter(t => !t.done) :
        statusFilter === 'done' ? todos.filter(t => t.done) :
        todos

    methods:
      addTodo: |
        if (newTodo.trim()) {
          todos.push({ id: Date.now(), text: newTodo.trim(), done: false });
          newTodo = "";
        }
      toggleTodo: |
        todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t)
      removeTodo: |
        todos = todos.filter(t => t.id !== id)
      clearDone: |
        todos = todos.filter(t => !t.done)
      setFilter: "statusFilter = value"

    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .py-12 .px-4 .antialiased:
        div .max-w-lg .mx-auto:

          # Page Header
          div .text-center .mb-10:
            children:
              - h1 .text-4xl .font-bold .tracking-tight .text-slate-900 .dark:text-white .mb-3: "Tasks"
              - div .inline-flex .items-center .px-3 .py-1 .rounded-full .bg-slate-100 .dark:bg-slate-800 .text-xs .font-medium .text-slate-600 .dark:text-slate-400: "{{ doneCount }} of {{ totalCount }} completed"

          # Task Input Area
          div .relative .mb-8:
            children:
              - input .block .w-full .rounded-2xl .border-0 .bg-white .dark:bg-slate-900 .pl-4 .pr-24 .py-4 .text-slate-900 .dark:text-white .shadow-sm .ring-1 .ring-inset .ring-slate-200 .dark:ring-slate-800 .placeholder:text-slate-400 .focus:ring-2 .focus:ring-inset .focus:ring-slate-900 .dark:focus:ring-slate-100 .transition-all:
                  v-model: newTodo
                  attrs:
                    placeholder: "Add a new task..."
                    type: text
              - button .absolute .right-2 .top-2 .bottom-2 .bg-slate-900 .dark:bg-slate-100 .text-white .dark:text-slate-900 .px-5 .rounded-xl .text-sm .font-semibold .hover:opacity-90 .active:scale-95 .transition-all:
                  "@click": addTodo
                  text: "Add"

          # Status Filters
          div .flex .p-1 .bg-slate-100 .dark:bg-slate-800/50 .rounded-xl .mb-6:
            children:
              - button .flex-1 .py-2 .text-sm .font-medium .rounded-lg .transition-all:
                  ":class": "statusFilter === 'all' ? 'bg-white dark:bg-slate-800 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'"
                  "@click": "setFilter('all')"
                  text: "All"
              - button .flex-1 .py-2 .text-sm .font-medium .rounded-lg .transition-all:
                  ":class": "statusFilter === 'pending' ? 'bg-white dark:bg-slate-800 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'"
                  "@click": "setFilter('pending')"
                  text: "Pending"
              - button .flex-1 .py-2 .text-sm .font-medium .rounded-lg .transition-all:
                  ":class": "statusFilter === 'done' ? 'bg-white dark:bg-slate-800 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400'"
                  "@click": "setFilter('done')"
                  text: "Done"

          # Task List
          div .space-y-3:
            children:
              - div .group .flex .items-center .gap-4 .bg-white .dark:bg-slate-900 .rounded-2xl .px-5 .py-4 .shadow-sm .ring-1 .ring-slate-200 .dark:ring-slate-800 .transition-all .hover:shadow-md .hover:ring-slate-300 .dark:hover:ring-slate-700:
                  v-for: "todo in filteredTodos"
                  :key: todo.id
                  children:
                    # Status Toggle
                    - button .relative .flex .h-6 .w-6 .items-center .justify-center .rounded-full .transition-colors .cursor-pointer:
                        "@click": "toggleTodo(todo.id)"
                        children:
                          - img .w-6 .h-6:
                              attrs:
                                ":src": "todo.done ? 'https://api.iconify.design/lucide:check-circle-2.svg' : 'https://api.iconify.design/lucide:circle.svg'"
                                ":class": "todo.done ? 'text-emerald-500 opacity-100' : 'text-slate-300 dark:text-slate-600 opacity-50'"
                    # Task Description
                    - p .flex-1 .text-sm .font-medium .transition-all .duration-300:
                        ":class": "todo.done ? 'text-slate-400 line-through' : 'text-slate-700 dark:text-slate-200'"
                        text: "{{ todo.text }}"
                    # Remove Task
                    - button .opacity-0 .group-hover:opacity-100 .p-2 .text-slate-300 .hover:text-red-500 .dark:hover:text-red-400 .transition-all .cursor-pointer:
                        "@click": "removeTodo(todo.id)"
                        children:
                          - img .w-4 .h-4:
                              attrs:
                                src: "https://api.iconify.design/lucide:trash-2.svg"

          # Task Statistics
          div .mt-8 .flex .items-center .justify-between .px-2:
            children:
              - p .text-xs .text-slate-400: "{{ pendingCount }} tasks remaining"
              - button .text-xs .font-semibold .text-slate-400 .hover:text-red-500 .transition-colors .cursor-pointer:
                  v-if: doneCount > 0
                  "@click": clearDone
                  text: "Clear completed"
