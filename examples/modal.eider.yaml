name: Modal
global: {}
router:
  routes:
    - path: /
      component: ModalDemo

components:
  - name: Modal
    props:
      title:
        type: string
        default: ''
      message:
        type: string
        default: ''
      show:
        type: boolean
        default: false
    
    methods:
      close: "emit('close')"
      confirm: "emit('confirm')"

    template:
      # Modal Overlay
      div .fixed .inset-0 .z-50 .flex .items-center .justify-center .p-4 .transition-all .duration-300 .antialiased:
        v-show: show
        children:
          # Backdrop
          - div .absolute .inset-0 .bg-slate-950/60 .backdrop-blur-sm .transition-opacity:
              "@click": close

          # Modal Panel
          - div .relative .z-10 .w-full .max-w-md .bg-white .dark:bg-slate-900 .rounded-[2rem] .shadow-2xl .border .border-slate-200 .dark:border-slate-800 .overflow-hidden .transition-all .duration-300:
              children:
                # Header
                - div .flex .items-center .justify-between .px-8 .py-6 .border-b .border-slate-100 .dark:border-slate-800:
                    children:
                      - h3 .text-xl .font-bold .text-slate-900 .dark:text-white:
                          text: "{{ title }}"
                      - button .w-10 .h-10 .rounded-xl .flex .items-center .justify-center .text-slate-400 .hover:bg-slate-50 .dark:hover:bg-slate-800 .transition-colors:
                          "@click": close
                          children:
                            - img .w-5 .h-5:
                                attrs:
                                  src: "https://api.iconify.design/lucide:x.svg"

                # Body
                - div .px-8 .py-8:
                    children:
                      - p .text-slate-600 .dark:text-slate-400 .leading-relaxed:
                          text: "{{ message }}"
                      - slot:
                          attrs:
                            name: body

                # Footer
                - div .flex .items-center .justify-end .gap-3 .px-8 .py-6 .bg-slate-50 .dark:bg-slate-800/50:
                    children:
                      - button .px-6 .py-2.5 .text-sm .font-semibold .text-slate-600 .dark:text-slate-400 .hover:text-slate-900 .dark:hover:text-white .transition-colors:
                          "@click": close
                          text: "Cancel"
                      - button .px-6 .py-2.5 .text-sm .font-bold .text-white .bg-slate-900 .hover:bg-slate-800 .dark:bg-slate-100 .dark:text-slate-900 .dark:hover:bg-white .rounded-xl .active:scale-95 .transition-all:
                          "@click": confirm
                          text: "Confirm"

  - name: ModalDemo
    signals:
      showBasic: false
      showDelete: false
      showSuccess: false
      result: ""

    methods:
      onConfirmBasic: "result = 'Action confirmed'; showBasic = false"
      onConfirmDelete: "result = 'Item deleted permanently'; showDelete = false"
      onConfirmSuccess: "result = 'Operation completed'; showSuccess = false"

    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .p-8:
        div .max-w-2xl .mx-auto:
          children:
            - div .mb-12 .text-center:
                children:
                  - h1 .text-4xl .font-black .text-slate-900 .dark:text-white .tracking-tight .mb-3: "Modal System"
                  - p .text-slate-500 .dark:text-slate-400: "Clean, accessible, and reactive modal components"

            # Result feedback
            - div .mb-8 .px-6 .py-4 .bg-emerald-50 .dark:bg-emerald-950/30 .border .border-emerald-100 .dark:border-emerald-900/50 .rounded-2xl .flex .items-center .gap-3:
                v-if: result
                children:
                  - img .w-5 .h-5 .text-emerald-600:
                      attrs:
                        src: "https://api.iconify.design/lucide:check-circle.svg"
                  - span .text-sm .font-bold .text-emerald-700 .dark:text-emerald-400:
                      text: "{{ result }}"

            # Triggers grid
            - div .grid .grid-cols-1 .sm:grid-cols-3 .gap-4:
                children:
                  - button .px-6 .py-4 .rounded-2xl .text-sm .font-bold .bg-white .dark:bg-slate-900 .border .border-slate-200 .dark:border-slate-800 .text-slate-900 .dark:text-white .hover:shadow-lg .transition-all:
                      "@click": "showBasic = true"
                      text: "Basic Modal"
                  - button .px-6 .py-4 .rounded-2xl .text-sm .font-bold .bg-red-50 .dark:bg-red-950/30 .border .border-red-100 .dark:border-red-900/50 .text-red-700 .dark:text-red-400 .hover:bg-red-100 .transition-all:
                      "@click": "showDelete = true"
                      text: "Delete Modal"
                  - button .px-6 .py-4 .rounded-2xl .text-sm .font-bold .bg-slate-900 .dark:bg-slate-100 .text-white .dark:text-slate-900 .hover:shadow-xl .active:scale-95 .transition-all:
                      "@click": "showSuccess = true"
                      text: "Success Modal"

            # Modal Instances
            - Modal:
                attrs:
                  ":show": showBasic
                  title: "Standard Action"
                  message: "This is a basic modal component using slots and signals."
                "@close": "showBasic = false"
                "@confirm": onConfirmBasic

            - Modal:
                attrs:
                  ":show": showDelete
                  title: "Confirm Deletion"
                  message: "Are you sure you want to remove this item? This action is permanent."
                "@close": "showDelete = false"
                "@confirm": onConfirmDelete

            - Modal:
                attrs:
                  ":show": showSuccess
                  title: "Success!"
                  message: "Your request has been processed successfully."
                "@close": "showSuccess = false"
                "@confirm": onConfirmSuccess
