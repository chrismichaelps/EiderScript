# @EiderScript.Example.ComponentSync
%YAML 1.2
---
name: ComponentSyncExample

router:
  routes:
    - path: /
      component: UserProfileEditor


components:
  # Reusable text input component
  CustomTextInput:
    props:
      modelValue:
        type: string
        default: ''
      label:
        type: string
        default: 'Enter Text'
      placeholder:
        type: string
        default: 'Type here...'

    emits:
      - "update:modelValue"
      - focus
      - blur

    signals:
      isFocused: false

    methods:
      # Emit update:modelValue to trigger the parent's v-model update
      handleInput: |
        emit('update:modelValue', $event)

      handleFocus: |
        isFocused = true
        emit('focus')

      handleBlur: |
        isFocused = false
        emit('blur')

    template:
      div .space-y-1.5:
        children:
          - label .block .text-xs .font-bold .text-slate-500 .dark:text-slate-400 .uppercase .tracking-wider:
              text: "{{ label }}"
          - div .relative:
              children:
                - input .w-full .bg-slate-50 .dark:bg-slate-800/50 .border .border-slate-300 .dark:border-slate-700 .rounded-xl .px-4 .py-3 .text-sm .text-slate-900 .dark:text-white .outline-none .focus:ring-2 .focus:ring-slate-900/20 .dark:focus:ring-slate-100/20 .focus:border-slate-900 .dark:focus:border-slate-100 .transition-all:
                    attrs:
                      type: "text"
                      :value: "modelValue"
                      :placeholder: "placeholder"
                    "@input": "handleInput($event.target.value)"
                    "@focus": "handleFocus"
                    "@blur": "handleBlur"

  # Main editor component
  UserProfileEditor:
    signals:
      username: 'eider_fan_99'
      firstName: ''
      lastName: ''
      isEditing: false

    computeds:
      fullName: |
        [firstName, lastName].filter(x => x).join(' ') || 'Anonymous User'

    methods:
      toggleEdit: |
        isEditing = !isEditing
      
      saveProfile: |
        isEditing = false

    template:
      div .min-h-screen .bg-slate-50 .dark:bg-slate-950 .py-12 .px-4:
        div .max-w-xl .mx-auto:
          children:
            - h1 .text-3xl .font-black .text-slate-900 .dark:text-white .mb-2: "Profile Settings"
            - p .text-slate-500 .dark:text-slate-400 .mb-8: "Real-time state synchronization across component boundaries."

            # Read-only profile view
            - div .bg-white .dark:bg-slate-900 .rounded-3xl .shadow-xl .shadow-slate-900/5 .border .border-slate-200 .dark:border-slate-800 .overflow-hidden:
                v-if: "isEditing == false"
                children:
                  - div .p-8:
                      children:
                        - div .flex .items-center .gap-4 .mb-6:
                            children:
                              - div .w-16 .h-16 .rounded-full .bg-slate-900 .dark:bg-slate-100 .flex .items-center .justify-center .text-white .dark:text-slate-900 .text-2xl .font-bold:
                                  text: "{{ username[0].toUpperCase() }}"
                              - div:
                                  children:
                                    - h2 .text-xl .font-bold .text-slate-900 .dark:text-white: "{{ fullName }}"
                                    - p .text-slate-600 .dark:text-slate-400 .text-sm: "@{{ username }}"
                        - div .grid .grid-cols-2 .gap-4 .mb-8:
                            children:
                              - div .bg-slate-50 .dark:bg-slate-800/50 .p-4 .rounded-2xl .border .border-slate-200 .dark:border-slate-800:
                                  children:
                                    - p .text-xs .text-slate-500 .uppercase .tracking-widest .mb-1: "First Name"
                                    - p .text-slate-900 .dark:text-white .font-medium: "{{ firstName || '—' }}"
                              - div .bg-slate-50 .dark:bg-slate-800/50 .p-4 .rounded-2xl .border .border-slate-200 .dark:border-slate-800:
                                  children:
                                    - p .text-xs .text-slate-500 .uppercase .tracking-widest .mb-1: "Last Name"
                                    - p .text-slate-900 .dark:text-white .font-medium: "{{ lastName || '—' }}"
                        - button .w-full .bg-slate-900 .dark:bg-slate-100 .hover:bg-slate-800 .dark:hover:bg-white .text-white .dark:text-slate-900 .font-bold .py-4 .rounded-2xl .transition-all .active:scale-95:
                            "@click": "toggleEdit"
                            attrs:
                              ":class": "{ 'opacity-50 cursor-not-allowed': isEditing }"
                            text: "Edit Profile"

            # Profile editing form
            - div .bg-white .dark:bg-slate-900 .rounded-3xl .shadow-xl .shadow-slate-900/5 .border .border-slate-200 .dark:border-slate-800 .p-8:
                v-else: true
                children:
                  - div .space-y-6:
                      children:
                        - CustomTextInput:
                            v-model: "username"
                            attrs:
                              label: "Username"
                              placeholder: "@handle"
                        - CustomTextInput:
                            v-model: "firstName"
                            attrs:
                              label: "First Name"
                              placeholder: "Your name"
                        - CustomTextInput:
                            v-model: "lastName"
                            attrs:
                              label: "Last Name"
                              placeholder: "Your surname"
                  - div .flex .gap-3 .mt-8:
                      children:
                        - button .flex-1 .bg-slate-100 .dark:bg-slate-800 .hover:bg-slate-200 .dark:hover:bg-slate-700 .text-slate-600 .dark:text-slate-300 .font-bold .py-4 .rounded-2xl .transition-all:
                            "@click": "toggleEdit"
                            text: "Cancel"
                        - button .flex-1 .bg-slate-900 .dark:bg-slate-100 .hover:bg-slate-800 .dark:hover:bg-white .text-white .dark:text-slate-900 .font-bold .py-4 .rounded-2xl .transition-all .active:scale-95:
                            "@click": "saveProfile"
                            text: "Save"

            # Real-time state preview
            - div .mt-8 .bg-slate-900 .rounded-2xl .p-6 .border .border-slate-800:
                children:
                  - h4 .text-xs .font-bold .text-slate-400 .uppercase .tracking-widest .mb-4: "State Pulse"
                  - pre .text-slate-300 .text-xs: "{{ {\n  username: username,\n  firstName: firstName,\n  lastName: lastName \n} | json }}"
